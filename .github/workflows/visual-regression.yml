name: Visual Regression (Onboarding/Auth Contrast)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  visual-onboarding:
    name: Onboarding & Auth contrast check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_BASE_URL: http://localhost:8080
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium webkit

      - name: Build app
        run: bun run build

      - name: Start preview server
        run: |
          bun run preview --host 127.0.0.1 --port 8080 > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080 > /dev/null; then
              echo "preview up"; exit 0
            fi
            sleep 1
          done
          echo "preview failed to start"; cat /tmp/preview.log; exit 1

      - name: Run visual regression suite
        run: bunx playwright test tests/e2e/visual-onboarding.spec.ts --reporter=list

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-onboarding-screenshots
          path: |
            tests/e2e/screenshots/**
            test-results/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/preview.pid ]; then kill "$(cat /tmp/preview.pid)" || true; fi
